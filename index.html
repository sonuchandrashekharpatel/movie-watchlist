<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Movie Watchlist</title>

        <link href="index.css" rel="stylesheet">

        <!-- Google Fonts-->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

        <!-- cdn -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    </head>
    <body>
        <div class="container">
            <header class="header">
                <div class="content padding">
                    <h1>Find your film</h1>
                    <a class="my-watchlist" href="watchlist.html">My Watchlist</a>
                </div>
            </header>
            <main>
                <div class="search-bar">
                    <div>
                        <i class="fa-solid fa-magnifying-glass search-icon"></i>
                        <input id="movie-input" type="text" placeholder="3 Idiots">
                    </div>
                    <button id="search-btn" class="search-btn">Search</button>
                </div>
                <div id="movie-el" class="movie-section padding">
                    <div class="movie-placeholder" id="placeholder">
                        <img src="images/Icon.png" alt="movie icon">
                        <p class="placeholder-txt">Start Exploring</p> 
                    </div>
                </div>
            </main>
        </div>
        <script src="index.js"></script>
    </body>
</html>
